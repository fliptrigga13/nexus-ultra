version: "3.9"

# ══════════════════════════════════════════════════════════════════
# NEXUS ULTRA — Docker Compose
# One command to run the full autonomous AI monitoring stack:
#   docker-compose up -d
#
# Prerequisites:
#   - Docker Desktop installed
#   - nvidia-container-toolkit installed (for GPU support)
#   - Add your NOTION_TOKEN to .env before starting
# ══════════════════════════════════════════════════════════════════

services:

  # ── Ollama — local LLM inference ────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: nexus_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_MAX_LOADED_MODELS=3
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_GPU_OVERHEAD=512
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Redis — swarm blackboard ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-${REDIS_PASSWORD}}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  # ── NEXUS Swarm Loop — 6-agent AI swarm ─────────────────────────
  swarm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus_swarm
    restart: unless-stopped
    depends_on:
      - ollama
      - redis
    env_file: .env
    environment:
      - PYTHONIOENCODING=utf-8
      - OLLAMA_URL=http://ollama:11434
      - REDIS_HOST=redis
    volumes:
      - ./nexus_mind.db:/app/nexus_mind.db
      - ./swarm_active.log:/app/swarm_active.log
    command: python -X utf8 -u nexus_swarm_loop.py
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('nexus_mind.db').execute('SELECT 1')"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ── Notion Sync — pipes swarm data to Notion every 35s ──────────
  notion_sync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus_notion_sync
    restart: unless-stopped
    depends_on:
      - swarm
    env_file: .env
    volumes:
      - ./nexus_mind.db:/app/nexus_mind.db
      - ./swarm_active.log:/app/swarm_active.log
    command: python nexus_notion_sync.py

  # ── NEXUS Hub — web interface ────────────────────────────────────
  hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus_hub
    restart: unless-stopped
    depends_on:
      - swarm
      - redis
    env_file: .env
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - NODE_ENV=production
    command: node server.cjs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Watchdog — auto-restarts crashed Python services ─────────────
  watchdog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus_watchdog
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: python nexus_watchdog_guardian.py
    environment:
      - PYTHONIOENCODING=utf-8
      - DOCKER_MODE=true

volumes:
  ollama_models:
  redis_data:

networks:
  default:
    name: nexus_network

